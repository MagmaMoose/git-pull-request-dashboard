apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation
resources:
  - ../../base
patches:
  # Adds the Flux-managed APP_VERSION env (JSON 6902 patch; see app-version.yaml).
  - path: app-version.yaml
    target:
      kind: Deployment
      name: git-pull-request-dashboard
images:
  - name: ghcr.io/magmamoose/git-pull-request-dashboard
    newTag: v1.7.0 # {"$imagepolicy": "flux-system:git-pull-request-dashboard:tag"}
# Copy the (Flux-bumped) image tag into the APP_VERSION env added by
# app-version.yaml, so the version the SPA reports always matches the deployed
# image. Flux only updates the images $imagepolicy marker above, so we derive
# APP_VERSION from it here instead of relying on a second marker.
replacements:
  - source:
      kind: Deployment
      name: git-pull-request-dashboard
      fieldPath: spec.template.spec.containers.[name=git-pull-request-dashboard].image
      options:
        delimiter: ":"
        index: 1
    targets:
      - select:
          kind: Deployment
          name: git-pull-request-dashboard
        fieldPaths:
          - spec.template.spec.containers.[name=git-pull-request-dashboard].env.[name=APP_VERSION].value
