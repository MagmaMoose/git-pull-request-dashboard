apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: automation
resources:
  - ../../base
patches:
  # Adds the Flux-managed APP_VERSION env (JSON 6902 patch; see app-version.yaml).
  - path: app-version.yaml
    target:
      kind: Deployment
      name: git-pull-request-dashboard
images:
  - name: ghcr.io/magmamoose/git-pull-request-dashboard
    newTag: v1.6.0 # {"$imagepolicy": "flux-system:git-pull-request-dashboard:tag"}
