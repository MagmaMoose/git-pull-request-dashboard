# kics-scan disable=3e2d3b2f-c22a-4df1-9cc6-a7a0aebb0c99
# ^ KICS "Passwords And Secrets - Generic Secret" is a false positive here: this
#   file contains no secret values. Each `secretKey` below is a Kubernetes Secret
#   *data-key name*; the real values are pulled from OCI Vault at runtime via
#   `remoteRef.key`. KICS matches on the `secretKey` field name (a CRD-mandated
#   key we can't rename), so the query is disabled for this file.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: github-oauth
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: oci-vault
    kind: ClusterSecretStore
  target:
    name: github-oauth
    creationPolicy: Owner
    template:
      type: Opaque
  data:
    # Stable secret that seals the OAuth session cookie. Without it the server
    # falls back to a random per-process key, so every pod restart invalidates
    # all logins (see server/index.mjs). Value: `openssl rand -hex 32`.
    # checkov:skip=CKV_SECRET_6:secretKey is a K8s Secret data-key name, not a value
    - secretKey: session-secret
      remoteRef:
        key: pullrequests-session-secret
    # github.com OAuth App credentials (Settings > Developer settings > OAuth Apps).
    # checkov:skip=CKV_SECRET_6:secretKey is a K8s Secret data-key name, not a value
    - secretKey: github-client-id
      remoteRef:
        key: pullrequests-github-oauth-client-id
    # checkov:skip=CKV_SECRET_6:secretKey is a K8s Secret data-key name, not a value
    - secretKey: github-client-secret
      remoteRef:
        key: pullrequests-github-oauth-client-secret
    # GHE_OAUTH_APPS JSON map (host -> {clientId, clientSecret, apiUrl, webUrl}) for
    # the pinkroccade.ghe.com OAuth App. Stored whole because the server reads it
    # as a single JSON env var.
    # checkov:skip=CKV_SECRET_6:secretKey is a K8s Secret data-key name, not a value
    - secretKey: ghe-oauth-apps
      remoteRef:
        key: pullrequests-ghe-oauth-apps
